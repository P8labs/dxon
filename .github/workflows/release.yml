name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release — MAJOR.MINOR.PATCH, no leading 'v' (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 (workflow_dispatch only):
  #   • Validates the version string.
  #   • Bumps the version in Cargo.toml and Cargo.lock.
  #   • Commits the change and pushes an annotated tag.
  # On a plain tag push this job is skipped automatically.
  # ---------------------------------------------------------------------------
  prepare:
    name: Bump version & create tag
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.push.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$VERSION'. Use MAJOR.MINOR.PATCH (e.g. 1.2.3) — no leading 'v'."
            exit 1
          fi

      - name: Update Cargo.toml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          grep '^version = ' Cargo.toml

      - name: Update Cargo.lock
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          python3 << 'EOF'
          import re, os
          version = os.environ['VERSION']
          content = open('Cargo.lock').read()
          content = re.sub(
              r'(name = "dxon"\nversion = ")[^"]+(")',
              r'\g<1>' + version + r'\2',
              content
          )
          open('Cargo.lock', 'w').write(content)
          EOF

      - name: Commit, tag, and push
        id: push
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git tag -a "$TAG" -m "Release $VERSION"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Job 2: Cross-compile release binaries.
  # Runs on:
  #   • A plain tag push  (push: tags: v*)
  #   • workflow_dispatch after 'prepare' succeeds
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [prepare]
    if: always() && ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && needs.prepare.result == 'success'))
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
          - target: armv7-unknown-linux-musleabihf
            arch: armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # dispatch: check out the tag we just pushed; tag push: GITHUB_REF is the tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=v${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Build binary for ${{ matrix.target }}
        run: |
          docker buildx build \
            --build-arg VERSION=$VERSION \
            --build-arg TARGET=${{ matrix.target }} \
            --build-arg ARCH=${{ matrix.arch }} \
            --file Dockerfile \
            --output type=local,dest=release \
            .

      - name: Generate SHA256 checksums
        run: |
          cd release
          for file in dxon-*; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dxon-${{ matrix.target }}
          path: release/*

  # ---------------------------------------------------------------------------
  # Job 3: Publish the GitHub Release with all artifacts.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact structure
        run: |
          mkdir release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release

      - name: Set tag name
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          make_latest: true
          body: |
            ## dXon

            **dXon** is a lightweight developer container manager designed to create isolated development environments without polluting the host system.

            It uses system tools such as **systemd-nspawn**, **pacstrap**, and **debootstrap** to bootstrap reproducible development containers using templates.

            ### Supported Platforms
            - Linux x86_64 (Intel / AMD 64-bit)
            - Linux ARM64 (aarch64)
            - Linux ARMv7

            ### Installation 

            See the [documentation](https://p8labs.github.io/dxon) for more information.
            See Template Registry [(dxon-registry)](https://github.com/P8labs/dxon-registry)

            ---
            Maintained by **P8labs**
          files: release/*