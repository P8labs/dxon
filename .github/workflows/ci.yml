name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --bins -- --nocapture

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build dxon binary (debug)
        run: cargo build

      - name: Run E2E tests (offline, no system tools)
        run: cargo test --test e2e -- --nocapture

  # e2e-network-tests:
  #   name: E2E Tests (Network)
  #   runs-on: ubuntu-latest
  #   needs: [e2e-tests]
  #   if: github.event_name == 'push'
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4

  #     - name: Install Rust (stable)
  #       uses: dtolnay/rust-toolchain@stable

  #     - name: Cache Cargo registry
  #       uses: Swatinem/rust-cache@v2

  #     - name: Build dxon binary (debug)
  #       run: cargo build

  #     - name: Run network E2E tests
  #       run: cargo test --test e2e -- template --include-ignored --nocapture

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxon-linux-x86_64
          path: target/release/dxon
          retention-days: 30
